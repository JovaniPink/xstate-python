name: Run tests and code quality

on:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        run: python -m pip install "poetry>=2.0,<3.0"
      - name: Install dependencies
        run: poetry install
      - name: Run tests
        run: poetry run pytest tests/ --ignore=tests/test_scxml.py --cov --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
  scxml-smoke:
    name: SCXML smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Poetry
        run: python -m pip install "poetry>=2.0,<3.0"
      - name: Install dependencies
        run: poetry install
      - name: Run SCXML smoke suite
        run: poetry run python -m pytest tests/test_scxml.py -m scxml_ci
  code-quality:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        run: python -m pip install "poetry>=2.0,<3.0"
      - name: Install dependencies
        run: poetry install
      - name: Check formatting
        run: poetry run ruff format --check src/ tests/
      - name: Run lint
        run: poetry run ruff check src/ tests/
      - name: Run type checks
        run: poetry run mypy src/xstate/
